name: Build Audio Prompt Studio
on: [workflow_dispatch, push]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: npm install
      - run: npm run dist -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: AudioPromptStudio-Windows-Setup
          path: release/AudioPromptStudio-Setup.exe
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: npm install
      - run: npm run dist -- --publish never -- --mac dmg --universal
      - uses: actions/upload-artifact@v4
        with:
          name: AudioPromptStudio-macOS
          path: release/AudioPromptStudio-macOS.dmg
