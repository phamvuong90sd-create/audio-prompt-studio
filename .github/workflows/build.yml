name: Build Audio Prompt Studio
on: [workflow_dispatch, push]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: npm install
      - name: Bundle whisper.cpp for Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force vendor/whisper/models | Out-Null
          $rel = Invoke-RestMethod https://api.github.com/repos/ggml-org/whisper.cpp/releases/latest
          $asset = $rel.assets | Where-Object { $_.name -match 'whisper.*bin.*x64.*zip' -or $_.name -match 'whisper.*x64.*zip' } | Select-Object -First 1
          if (-not $asset) { throw 'No Windows whisper.cpp binary asset found' }
          Invoke-WebRequest $asset.browser_download_url -OutFile whisper.zip
          Expand-Archive whisper.zip -DestinationPath vendor/whisper -Force
          $exe = Get-ChildItem vendor/whisper -Recurse -Filter whisper-cli.exe | Select-Object -First 1
          if (-not $exe) { $exe = Get-ChildItem vendor/whisper -Recurse -Filter main.exe | Select-Object -First 1 }
          if (-not $exe) { throw 'whisper cli exe not found in release asset' }
          Copy-Item $exe.FullName vendor/whisper/whisper-cli.exe -Force
          Invoke-WebRequest https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin -OutFile vendor/whisper/models/ggml-base.bin
      - run: npm run dist -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: AudioPromptStudio-Windows-Setup
          path: release/AudioPromptStudio-Setup.exe
  build-macos:
    continue-on-error: true
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: npm install
      - run: npm run build && npx electron-builder --mac dmg --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: AudioPromptStudio-macOS
          path: release/AudioPromptStudio-macOS.dmg
